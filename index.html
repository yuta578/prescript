<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Prescript</title>
  <link rel="stylesheet" href="css/styles.css">
  <style>

    /* ── BOTÓN DE INICIO ── */
    #start-screen {
      position: fixed;
      inset: 0;
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }

    #start-btn {
      pointer-events: all;
      background: transparent;
      border: 1px solid rgba(255, 255, 255, 0.22);
      color: rgba(255, 255, 255, 0.65);
      padding: 12px 36px;
      border-radius: 3px;
      font-size: 0.78rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      cursor: pointer;
      transition: border-color 0.25s, color 0.25s;

      opacity: 0;
      animation: fadeUp 0.7s ease 0.4s forwards;
    }

    #start-btn:hover {
      border-color: rgba(255, 255, 255, 0.55);
      color: rgba(255, 255, 255, 0.95);
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0);   }
    }

    /* ── DIÁLOGO CON LA FLOR ── */
    #dialog-screen {
      position: fixed;
      inset: 0;
      z-index: 200;
      display: none;
      align-items: flex-end;
      justify-content: center;
      padding-bottom: 60px;
      pointer-events: none;
    }

    #dialog-screen.active {
      display: flex;
    }

    #dialog-box {
      pointer-events: all;
      max-width: 300px;
      width: 85%;
      padding: 20px 24px;
      background: rgba(8, 8, 8, 0.78);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 3px;
      text-align: left;

      opacity: 0;
      transform: translateY(12px);
      transition: opacity 0.4s ease, transform 0.4s ease;
    }

    #dialog-box.visible {
      opacity: 1;
      transform: translateY(0);
    }

    #dialog-text {
      font-size: 0.85rem;
      line-height: 1.7;
      color: rgba(255, 255, 255, 0.68);
      margin: 0 0 18px;
      min-height: 3.4em;
    }

    #dialog-next {
      display: block;
      margin-left: auto;
      background: transparent;
      border: 1px solid rgba(255, 255, 255, 0.18);
      color: rgba(255, 255, 255, 0.5);
      padding: 6px 20px;
      border-radius: 2px;
      font-size: 0.72rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }

    #dialog-next:hover {
      border-color: rgba(255, 255, 255, 0.45);
      color: rgba(255, 255, 255, 0.85);
    }

    /* ── CAJÓN PRESCRIPT ── */
    /* Empieza desplazado hacia arriba, se desliza hacia abajo al aparecer */
    #prescrip-wrap {
      opacity: 0;
      transform: translateY(-32px);
      transition: opacity 0.55s ease, transform 0.62s cubic-bezier(0.22, 1, 0.36, 1);
      pointer-events: none;
    }

    #prescrip-wrap.visible {
      opacity: 1;
      transform: translateY(0);
      pointer-events: all;
    }

    /* Si ya pasó la intro: visible sin animación */
    #prescrip-wrap.no-intro {
      opacity: 1;
      transform: none;
      transition: none;
      pointer-events: all;
    }

    /* Botón Lucky oculto hasta diálogo 7 */
    #btn-wrap {
      overflow: hidden;
      max-height: 0;
      opacity: 0;
      transition: max-height 0.5s cubic-bezier(0.22, 1, 0.36, 1), opacity 0.4s ease;
    }

    #btn-wrap.visible {
      max-height: 80px;
      opacity: 1;
    }

    #btn-wrap.no-intro {
      max-height: 80px;
      opacity: 1;
      transition: none;
    }

  </style>
</head>
<body>

<!-- PANTALLA 1: botón para iniciar diálogo -->
<div id="start-screen">
  <button id="start-btn">?</button>
</div>

<!-- PANTALLA 2: diálogo con la flor -->
<div id="dialog-screen">
  <div id="dialog-box">
    <p id="dialog-text"></p>
    <button id="dialog-next">›</button>
  </div>
</div>

<div class="scene">
  <div class="corner tl"></div>
  <div class="corner tr"></div>
  <div class="corner bl"></div>
  <div class="corner br"></div>

  <div class="prescrip-image">
    <img src="./media/flor.png" alt="imagen prescrip">
  </div>

  <!-- Cuadro de mensajes: aparece en diálogo 4 -->
  <div id="prescrip-wrap">
    <div class="prescrip-box">
      <div class="prescrip-box">
        <div class="prescrip-text" id="p-text">—</div>
      </div>
      <!-- Botón Lucky: aparece en diálogo 7, empieza oculto dentro del cajón -->
      <div class="btn-wrap" id="btn-wrap">
        <button class="gen-btn" id="btn">Lucky</button>
      </div>
    </div>
  </div>

</div>

<script src="scripts/script.js"></script>
</body>
</html>
